name: Build switchScript

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '#README.md'
      - '#switchScript.sh'
      
  # schedule:
    # - cron: 0 4 * * *

env:
  SCRIPT_SH: ./.github/workflows/switchScript.sh
  TZ: Asia/Shanghai
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    # container: devkitpro/devkita64:latest
    permissions:
      contents: write

    steps:
      # - name: Add safe.directory Update libnx
        # run: |
          # git config --global --add safe.directory "*"
          # git clone --recurse-submodules https://github.com/switchbrew/libnx.git
          # cd libnx
          # make -j$(nproc) install

      - name: Checkout latest code
        uses: actions/checkout@v6
        with:
          ref: main
          clean: true
          fetch-depth: 0
          fetch-tags: true
          # submodules: recursive

      - name: Initialization environment
        run: |
          sudo -E apt install -y jq

      - name: Build and Extract version
        run: |
          chmod +x $SCRIPT_SH
          ./$SCRIPT_SH
          
          APP_NAME="心悦大气层中文整合包"
          VER_FILE="description.txt"
          KEY="Atmosphère"
          
          VERSION=$(grep -F "$KEY" "$VER_FILE" | grep -oE '[0-9]+' | head -3 | paste -s -d '.')
          DATE=$(date +%Y%m%d)
          DATE_TIME=$(date '+%Y%m%d %H:%M:%S')
          
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG_NAME=${DATE}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${APP_NAME} v${DATE_TIME}" >> "$GITHUB_ENV"

          zip -rq SwitchSD.zip SwitchSD
          mv SwitchSD.zip SwitchSD-AMS${VERSION}-v${DATE}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body_path: description.txt
          draft: false
          prerelease: false
          generate_release_notes: false
          make_latest: true
          files: |
            SwitchSD-AMS${{ env.VERSION }}-v${{ env.TAG_NAME }}.zip

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 7
          delete_tags: true